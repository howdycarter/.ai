  <rect x="480" y="392" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="421" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>
  <rect x="700" y="392" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="421" text-anchor="middle" font-size="14" fill="#991b1b">45% ship vulnerable</text>
  <rect x="920" y="392" width="210" height="48" rx="4" fill="#fff3bf" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="421" text-anchor="middle" font-size="14" fill="#92400e">Basic only</text>

  <!-- Row 6 -->
  <rect x="10" y="450" width="240" height="48" rx="4" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="479" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Session resumption</text>
  <rect x="260" y="450" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="479" text-anchor="middle" font-size="14" fill="#15803d">Checkpoints + skill</text>
  <rect x="480" y="450" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="479" text-anchor="middle" font-size="14" fill="#991b1b">N/A (human memory)</text>
  <rect x="700" y="450" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="479" text-anchor="middle" font-size="14" fill="#991b1b">Agent forgets</text>
  <rect x="920" y="450" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="479" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>

  <!-- Row 7 -->
  <rect x="10" y="508" width="240" height="48" rx="4" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="537" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Multi-agent concurrency</text>
  <rect x="260" y="508" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="537" text-anchor="middle" font-size="14" fill="#15803d">CONCURRENCY.md</text>
  <rect x="480" y="508" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="537" text-anchor="middle" font-size="14" fill="#991b1b">Human coordination</text>
  <rect x="700" y="508" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="537" text-anchor="middle" font-size="14" fill="#991b1b">Not addressed</text>
  <rect x="920" y="508" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="537" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>

  <!-- Row 8 -->
  <rect x="10" y="566" width="240" height="48" rx="4" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="595" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Context budget mgmt</text>
  <rect x="260" y="566" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="595" text-anchor="middle" font-size="14" fill="#15803d">CONTEXT.md profiles</text>
  <rect x="480" y="566" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="595" text-anchor="middle" font-size="14" fill="#991b1b">N/A</text>
  <rect x="700" y="566" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="595" text-anchor="middle" font-size="14" fill="#991b1b">No awareness</text>
  <rect x="920" y="566" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="595" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>

  <!-- Row 9 -->
  <rect x="10" y="624" width="240" height="48" rx="4" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="653" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Feedback loop / retros</text>
  <rect x="260" y="624" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="653" text-anchor="middle" font-size="14" fill="#15803d">retrospectives/ built-in</text>
  <rect x="480" y="624" width="210" height="48" rx="4" fill="#fff3bf" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="653" text-anchor="middle" font-size="14" fill="#92400e">Sprint retros (manual)</text>
  <rect x="700" y="624" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="653" text-anchor="middle" font-size="14" fill="#991b1b">None</text>
  <rect x="920" y="624" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="653" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>

  <!-- Row 10: Cost -->
  <rect x="10" y="682" width="240" height="48" rx="4" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="711" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Cost</text>
  <rect x="260" y="682" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="711" text-anchor="middle" font-size="15" font-weight="600" fill="#15803d">Free (open source)</text>
  <rect x="480" y="682" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="711" text-anchor="middle" font-size="14" fill="#991b1b">$8-30/user/month</text>
  <rect x="700" y="682" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="711" text-anchor="middle" font-size="14" fill="#15803d">Free (no tool)</text>
  <rect x="920" y="682" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="711" text-anchor="middle" font-size="14" fill="#15803d">Free (open source)</text>

  <!-- Row 11: Agent-agnostic -->
  <rect x="10" y="740" width="240" height="48" rx="4" fill="#1e1e1e"/>
  <text x="130" y="769" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e5e5">AGENT-AGNOSTIC?</text>
  <rect x="260" y="740" width="210" height="48" rx="4" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <text x="365" y="769" text-anchor="middle" font-size="16" font-weight="700" fill="white">YES — any tool</text>
  <rect x="480" y="740" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="769" text-anchor="middle" font-size="14" fill="#991b1b">Not agent-native</text>
  <rect x="700" y="740" width="210" height="48" rx="4" fill="#fff3bf" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="769" text-anchor="middle" font-size="14" fill="#92400e">Depends on tool</text>
  <rect x="920" y="740" width="210" height="48" rx="4" fill="#fff3bf" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="769" text-anchor="middle" font-size="14" fill="#92400e">GitHub-centric</text>

  <!-- Legend -->
  <rect x="260" y="810" width="16" height="16" rx="3" fill="#b2f2bb" stroke="#22c55e" stroke-width="1"/>
  <text x="284" y="823" font-size="13" fill="#757575">Full support</text>
  <rect x="410" y="810" width="16" height="16" rx="3" fill="#fff3bf" stroke="#f59e0b" stroke-width="1"/>
  <text x="434" y="823" font-size="13" fill="#757575">Partial</text>
  <rect x="520" y="810" width="16" height="16" rx="3" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
  <text x="544" y="823" font-size="13" fill="#757575">Missing / inadequate</text>

  <!-- Bottom line -->
  <text x="600" y="860" text-anchor="middle" font-size="18" font-weight="600" fill="#1e1e1e">.ai/ is the only complete system — the rest solve one layer and leave the rest to you.</text>
