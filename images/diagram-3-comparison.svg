<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Inter, -apple-system, system-ui, sans-serif">
  <rect width="1200" height="880" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="32" font-weight="700" fill="#1e1e1e">.ai/ vs. Everything Else</text>
  <text x="600" y="72" text-anchor="middle" font-size="16" fill="#757575">Why structured context beats every alternative</text>

  <!-- Column headers -->
  <rect x="10" y="100" width="240" height="50" rx="8" fill="#1e1e1e"/>
  <text x="130" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#e5e5e5">CAPABILITY</text>

  <rect x="260" y="100" width="210" height="50" rx="8" fill="#22c55e"/>
  <text x="365" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="white">.ai/ (dot ai)</text>

  <rect x="480" y="100" width="210" height="50" rx="8" fill="#ef4444"/>
  <text x="585" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="white">Jira / Linear</text>

  <rect x="700" y="100" width="210" height="50" rx="8" fill="#f59e0b"/>
  <text x="805" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="white">Vibe Coding</text>

  <rect x="920" y="100" width="210" height="50" rx="8" fill="#4a9eed"/>
  <text x="1025" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="white">Spec Kit / Kiro</text>

  <!-- Row 1 -->
  <rect x="10" y="160" width="240" height="48" rx="4" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="189" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Spec-driven backlog</text>
  <rect x="260" y="160" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="189" text-anchor="middle" font-size="14" fill="#15803d">Full (12 primitives)</text>
  <rect x="480" y="160" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="189" text-anchor="middle" font-size="14" fill="#991b1b">Tickets, not specs</text>
  <rect x="700" y="160" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="189" text-anchor="middle" font-size="14" fill="#991b1b">No structure at all</text>
  <rect x="920" y="160" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="189" text-anchor="middle" font-size="14" fill="#15803d">Specs only</text>

  <!-- Row 2 -->
  <rect x="10" y="218" width="240" height="48" rx="4" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="247" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Design system integration</text>
  <rect x="260" y="218" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="247" text-anchor="middle" font-size="14" fill="#15803d">DESIGN.md built-in</text>
  <rect x="480" y="218" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="247" text-anchor="middle" font-size="14" fill="#991b1b">Separate tools</text>
  <rect x="700" y="218" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="247" text-anchor="middle" font-size="14" fill="#991b1b">None</text>
  <rect x="920" y="218" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="247" text-anchor="middle" font-size="14" fill="#991b1b">Not included</text>

  <!-- Row 3 -->
  <rect x="10" y="276" width="240" height="48" rx="4" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="305" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Agent behavior rules</text>
  <rect x="260" y="276" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
