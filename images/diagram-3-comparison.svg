  <rect x="480" y="276" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="305" text-anchor="middle" font-size="14" fill="#991b1b">Not agent-aware</text>
  <rect x="700" y="276" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="305" text-anchor="middle" font-size="14" fill="#991b1b">No rules</text>
  <rect x="920" y="276" width="210" height="48" rx="4" fill="#fff3bf" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="305" text-anchor="middle" font-size="14" fill="#92400e">Basic guidance</text>

  <!-- Row 4 -->
  <rect x="10" y="334" width="240" height="48" rx="4" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="130" y="363" text-anchor="middle" font-size="14" font-weight="500" fill="#1e1e1e">Plan review workflow</text>
  <rect x="260" y="334" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="365" y="363" text-anchor="middle" font-size="14" fill="#15803d">1-6 cycles + approve</text>
  <rect x="480" y="334" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="363" text-anchor="middle" font-size="14" fill="#991b1b">Sprint planning only</text>
  <rect x="700" y="334" width="210" height="48" rx="4" fill="#ffc9c9" stroke="#e0e0e0" stroke-width="1"/>
  <text x="805" y="363" text-anchor="middle" font-size="14" fill="#991b1b">No planning</text>
  <rect x="920" y="334" width="210" height="48" rx="4" fill="#b2f2bb" stroke="#e0e0e0" stroke-width="1"/>
  <text x="1025" y="363" text-anchor="middle" font-size="14" fill="#15803d">Plan generation</text>

  <!-- Row 5 -->
  <rect x="10" y="392" width="240" height="48" rx="4" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
