<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#fafafa"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-size="36" font-weight="700" fill="#1e1e1e">.ai/ — How It Works</text>
  <text x="600" y="85" text-anchor="middle" font-size="18" fill="#757575">Build software without writing code</text>

  <!-- Process zone -->
  <rect x="40" y="120" width="1120" height="200" rx="16" fill="#dbe4ff" opacity="0.4" stroke="#4a9eed" stroke-width="1"/>
  <text x="70" y="150" font-size="14" font-weight="600" fill="#4a9eed" letter-spacing="1">THE PROCESS</text>

  <!-- Step 1: You -->
  <rect x="70" y="170" width="280" height="120" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#1e1e1e">YOU</text>
  <text x="210" y="250" text-anchor="middle" font-size="16" fill="#475569">write what to build</text>

  <!-- Arrow 1 -->
  <line x1="350" y1="230" x2="430" y2="230" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="390" y="220" text-anchor="middle" font-size="14" fill="#757575">specs</text>

  <!-- Step 2: Agent -->
  <rect x="460" y="170" width="280" height="120" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#1e1e1e">AI AGENT</text>
  <text x="600" y="250" text-anchor="middle" font-size="16" fill="#475569">reads and builds</text>

  <!-- Arrow 2 -->
  <line x1="740" y1="230" x2="820" y2="230" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="780" y="220" text-anchor="middle" font-size="14" fill="#757575">code</text>

  <!-- Step 3: Software -->
  <rect x="850" y="170" width="280" height="120" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#1e1e1e">SOFTWARE</text>
  <text x="990" y="250" text-anchor="middle" font-size="16" fill="#475569">ships to users</text>

  <!-- Context bar -->
  <rect x="70" y="300" width="1060" height="40" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="600" y="326" text-anchor="middle" font-size="15" fill="#92400e">12 markdown files in your project tell the AI everything it needs to know</text>

  <!-- Benefits section -->
  <text x="70" y="395" font-size="14" font-weight="600" fill="#757575" letter-spacing="1">WHY USE IT?</text>

  <!-- Benefit 1 -->
  <rect x="70" y="415" width="250" height="130" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="195" y="465" text-anchor="middle" font-size="36" font-weight="700" fill="#15803d">95%</text>
  <text x="195" y="495" text-anchor="middle" font-size="16" fill="#475569">cheaper than hiring</text>
  <text x="195" y="515" text-anchor="middle" font-size="16" fill="#475569">developers</text>

  <!-- Benefit 2 -->
  <rect x="345" y="415" width="250" height="130" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1" filter="url(#shadow)"/>
  <text x="470" y="460" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a5f">No Code</text>
  <text x="470" y="485" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a5f">Required</text>
  <text x="470" y="515" text-anchor="middle" font-size="16" fill="#475569">just writing</text>

  <!-- Benefit 3 -->
  <rect x="620" y="415" width="250" height="130" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1" filter="url(#shadow)"/>
  <text x="745" y="460" text-anchor="middle" font-size="20" font-weight="700" fill="#3b1f8e">Works With</text>
  <text x="745" y="485" text-anchor="middle" font-size="20" font-weight="700" fill="#3b1f8e">Any AI Tool</text>
  <text x="745" y="515" text-anchor="middle" font-size="16" fill="#475569">Claude, Cursor, Codex...</text>

  <!-- Benefit 4 -->
  <rect x="895" y="415" width="250" height="130" rx="12" fill="#fff3bf" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="1020" y="460" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">Built-In</text>
  <text x="1020" y="485" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">Safety</text>
  <text x="1020" y="515" text-anchor="middle" font-size="16" fill="#475569">catches bad code</text>

  <!-- Old way vs New way -->
  <text x="70" y="605" font-size="20" font-weight="700" fill="#ef4444">THE OLD WAY</text>
  <g>
    <rect x="70" y="620" width="140" height="50" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
    <text x="140" y="650" text-anchor="middle" font-size="14" fill="#991b1b">Write ticket</text>
    <text x="220" y="650" font-size="18" fill="#ef4444">→</text>
    <rect x="240" y="620" width="140" height="50" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
    <text x="310" y="650" text-anchor="middle" font-size="14" fill="#991b1b">Wait for dev</text>
    <text x="390" y="650" font-size="18" fill="#ef4444">→</text>
    <rect x="410" y="620" width="140" height="50" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
    <text x="480" y="650" text-anchor="middle" font-size="14" fill="#991b1b">Meetings</text>
    <text x="560" y="650" font-size="18" fill="#ef4444">→</text>
    <rect x="580" y="620" width="140" height="50" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
    <text x="650" y="650" text-anchor="middle" font-size="14" fill="#991b1b">More waiting</text>
    <text x="730" y="650" font-size="18" fill="#ef4444">→</text>
    <rect x="750" y="620" width="140" height="50" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="1"/>
    <text x="820" y="650" text-anchor="middle" font-size="14" fill="#991b1b">Maybe ships?</text>
  </g>

  <text x="70" y="720" font-size="20" font-weight="700" fill="#22c55e">THE .ai/ WAY</text>
  <g>
    <rect x="70" y="735" width="250" height="55" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
    <text x="195" y="768" text-anchor="middle" font-size="18" font-weight="600" fill="#15803d">Write a spec</text>
    <text x="340" y="768" font-size="22" font-weight="700" fill="#22c55e">→</text>
    <rect x="380" y="735" width="250" height="55" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
    <text x="505" y="768" text-anchor="middle" font-size="18" font-weight="600" fill="#15803d">Agent builds it</text>
    <text x="650" y="768" font-size="22" font-weight="700" fill="#22c55e">→</text>
    <rect x="690" y="735" width="250" height="55" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
    <text x="815" y="768" text-anchor="middle" font-size="18" font-weight="600" fill="#15803d">Ships today</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="850" text-anchor="middle" font-size="24" font-weight="600" fill="#1e1e1e">Your PM tool is a directory.</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
