name: Feature request
description: Suggest an improvement, pack, adapter, schema, or workflow
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or tool problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Standard
        - CLI
        - Schema
        - Pack
        - Adapter
        - Docs
        - Example
    validations:
      required: true
